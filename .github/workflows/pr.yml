name: pr

on: pull_request

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  ci-cd:
    permissions:
      contents: write
      packages: write
      pull-requests: read
    uses: saan800/github/.github/workflows/_dotnet-build-test-pack-publish-nuget.yml@main
    with:
      os: ubuntu-latest
      dotnet-version: 10.0.x
      codecov-slug: "saan800/saansoft-taggedcache"
      is-release-branch: ${{ github.ref == 'refs/heads/main' }}
      harden-runner-policy: audit
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      NUGET_API_KEY: ${{ secrets.NUGET_TOKEN }}

  pr-labels:
    permissions:
      contents: read
      pull-requests: write
    uses: saan800/github/.github/workflows/_pr-labeler.yml@main
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-lint:
    permissions:
      contents: read
    uses: saan800/github/.github/workflows/_pr-lint.yml@main
    with:
      run-lint: true
      cspell-config: .cspell.json
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

